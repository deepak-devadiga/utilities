<div class="container">
  <div class="coin" [class.flipping]="isFlipping()">
    <div class="side heads">Heads</div>
    <div class="side tails">Tails</div>
  </div>

  <button mat-flat-button color="primary" [disabled]="isFlipping()" (click)="flip()">
    {{ isFlipping() ? 'Flipping...' : 'Flip Coin' }}
  </button>

  @if (result()) {
    <p class="result">
      Result:
      {{ result() | uppercase }}
    </p>
  }
</div>
